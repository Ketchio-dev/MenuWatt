name: MenuWatt
options:
  bundleIdPrefix: com.junsu
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  swift-testing:
    url: https://github.com/swiftlang/swift-testing.git
    exactVersion: "6.2.4"

targets:
  MenuWattCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/MenuWattCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junsu.menuwatt.core
        PRODUCT_NAME: MenuWattCore
        PRODUCT_MODULE_NAME: MenuWattCore
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "6.0"
        DEFINES_MODULE: true
        GENERATE_INFOPLIST_FILE: true

  CIOReport:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CIOReport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junsu.menuwatt.cioreport
        PRODUCT_NAME: CIOReport
        PRODUCT_MODULE_NAME: CIOReport
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CLANG_ENABLE_MODULES: true
        DEFINES_MODULE: true
        GENERATE_INFOPLIST_FILE: true
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/CIOReport/include"
        OTHER_LDFLAGS:
          - "-framework"
          - "IOKit"

  MenuWattSystem:
    type: framework
    platform: macOS
    sources:
      - path: Sources/MenuWattSystem
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junsu.menuwatt.system
        PRODUCT_NAME: MenuWattSystem
        PRODUCT_MODULE_NAME: MenuWattSystem
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "6.0"
        DEFINES_MODULE: true
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: MenuWattCore
      - target: CIOReport

  MenuWatt:
    type: application
    platform: macOS
    sources:
      - path: Sources/MenuWatt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junsu.menuwatt
        PRODUCT_NAME: MenuWatt
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "2"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Packaging/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "MenuWatt"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "6.0"
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    resources:
      - path: Packaging/Resources
        buildPhase: resources
    dependencies:
      - target: MenuWattCore
        embed: true
      - target: MenuWattSystem
        embed: true
      - target: CIOReport
        embed: true

  MenuWattTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junsu.menuwatt.tests
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: MenuWatt
      - target: MenuWattCore
      - target: MenuWattSystem
      - package: swift-testing
        product: Testing
